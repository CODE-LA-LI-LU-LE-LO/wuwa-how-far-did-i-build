name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Cleanup preview branch path
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PREVIEW_PATH: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone --branch pr-preview "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" preview-branch
          cd preview-branch
          rm -rf "${PREVIEW_PATH}"
          touch .nojekyll
          git add -A
          if git diff --cached --quiet; then
            echo "No preview files to remove."
          else
            git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
            git push origin HEAD:pr-preview
          fi

      - name: Comment cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- pr-preview-url -->";
            const body = `${marker}\n## PR Preview\n\nPR이 닫혀 \`pr-preview/pr-${context.payload.pull_request.number}/\` 미리보기 파일을 정리했습니다.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.find((comment) => comment.user?.type === "Bot" && comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Write cleanup summary
        run: |
          {
            echo "## PR Preview cleanup"
            echo ""
            echo "Removed preview branch path: \`pr-${{ github.event.pull_request.number }}/\`"
          } >> "$GITHUB_STEP_SUMMARY"
