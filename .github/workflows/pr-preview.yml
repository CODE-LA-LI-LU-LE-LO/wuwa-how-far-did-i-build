name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: pr-preview-${{ github.event.pull_request.number }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify static site
        run: node scripts/verify.mjs

      - name: Check app.js syntax
        run: node --check app.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload PR preview artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: pr-preview-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .
          include-hidden-files: true

      - name: Deploy PR preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pr-preview-${{ github.event.pull_request.number }}-${{ github.run_id }}-${{ github.run_attempt }}
          preview: true
          timeout: 900000
          error_count: 30
          reporting_interval: 10000

      - name: Write preview summary
        run: |
          {
            echo "## PR Preview"
            echo ""
            echo "Preview URL: ${{ steps.deployment.outputs.page_url }}"
            echo ""
            echo "This preview was deployed with GitHub Pages preview deployments and is refreshed on each PR update."
          } >> "$GITHUB_STEP_SUMMARY"
